name: ci

on:
  push:
  pull_request:

jobs:
  public-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.2
          actions-cache-folder: emsdk-cache
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - name: Enable pnpm
        run: corepack enable
      - name: Verify public evidence and reachable history
        run: pnpm verify:public

  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify agent governance and traceability
        run: node scripts/verify-governance.mjs

  native-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate Python sources
        run: python3 -m py_compile tools/*.py tests/conformance/*.py
      - name: Verify proposed Rust proof boundary
        run: node scripts/verify-rust-boundary.mjs
      - name: Build and test portable core
        run: make -C runtime/core test

  rust-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - name: Install pinned Rust proof toolchain
        run: rustup toolchain install 1.97.0 --profile minimal --component clippy --component rustfmt --target wasm32-unknown-unknown --target riscv32imafc-unknown-none-elf
      - name: Enable pnpm
        run: corepack enable
      - name: Verify native z8lua link, Wasm identity, and embedded no-std build
        run: pnpm verify:rust-spike

  web-product:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.2
          actions-cache-folder: emsdk-cache
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - name: Enable pnpm
        run: corepack enable
      - name: Install TypeScript workspace
        run: pnpm install --frozen-lockfile
      - name: Verify semantic text-run Native/Wasm identity
        run: pnpm verify:text-run
      - name: Verify deterministic bundled typography
        run: pnpm verify:typography
      - name: Check, test, and build Web product
        run: pnpm verify:web
      - name: Verify human-guided Skill package
        run: pnpm verify:skill
