name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  public-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.2
          actions-cache-folder: emsdk-cache
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - name: Enable pnpm
        run: corepack enable
      - name: Verify public evidence and reachable history
        run: pnpm verify:public

  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify agent governance and traceability
        run: node scripts/verify-governance.mjs

  native-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate Python sources
        run: python3 -m py_compile tools/*.py tests/conformance/*.py
      - name: Verify proposed Rust proof boundary
        run: node scripts/verify-rust-boundary.mjs
      - name: Build and test portable core
        run: make -C runtime/core test

  rust-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - name: Install pinned Rust proof toolchain
        run: rustup toolchain install 1.97.0 --profile minimal --component clippy --component rustfmt --target wasm32-unknown-unknown --target riscv32imafc-unknown-none-elf
      - name: Enable pnpm
        run: corepack enable
      - name: Verify native z8lua link, Wasm identity, and embedded no-std build
        run: pnpm verify:rust-spike

  web-product:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.2
          actions-cache-folder: emsdk-cache
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - name: Enable pnpm
        run: corepack enable
      - name: Install TypeScript workspace
        run: pnpm install --frozen-lockfile
      - name: Verify semantic text-run Native/Wasm identity
        run: pnpm verify:text-run
      - name: Verify deterministic bundled typography
        run: pnpm verify:typography
      - name: Verify Linux handheld browser-first boundary
        run: pnpm verify:linux-handheld
      - name: Check, test, and build Web product
        run: pnpm verify:web
      - name: Verify human-guided Skill package
        run: pnpm verify:skill

  linux-handheld:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.2
          actions-cache-folder: emsdk-cache
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - name: Enable pnpm
        run: corepack enable
      - name: Install TypeScript workspace
        run: pnpm install --frozen-lockfile
      - name: Verify Linux contracts and capture derivation
        run: pnpm verify:linux-handheld
      - name: Build unchanged public Web host
        run: pnpm --filter @aico8/web build
      - name: Run named 1024-square Linux Chromium simulator
        env:
          CHROME_BIN: /usr/bin/google-chrome
          AICO8_CHROME_HEADFUL: "1"
        run: xvfb-run --auto-servernum --server-args="-screen 0 1024x1024x24 -ac +extension GLX +render -noreset" pnpm capture:linux-web-simulator -- --product apps/web/dist --target apps/mobile/target-profile.linux.json --evidence artifacts/test-reports/linux-square
      - name: Independently verify retained Linux simulator evidence
        run: pnpm verify:linux-web-simulator -- artifacts/test-reports/linux-square/linux-handheld-simulator.json apps/web/dist apps/mobile/target-profile.linux.json artifacts/test-reports/linux-square
      - name: Retain Linux square-simulator evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-square-chromium-${{ github.sha }}
          path: artifacts/test-reports/linux-square
          if-no-files-found: error

  android-host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.2
          actions-cache-folder: emsdk-cache
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - name: Install pinned Android platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools" "emulator" "system-images;android-35;google_apis;x86_64"
      - name: Enable pnpm
        run: corepack enable
      - name: Install TypeScript workspace
        run: pnpm install --frozen-lockfile
      - name: Verify Android host contracts and lifecycle boundary
        run: pnpm verify:android-host
      - name: Build unchanged public Web host
        run: pnpm --filter @aico8/web build
      - name: Stage public Web host for native compile
        run: rsync -a --delete apps/web/dist/ apps/mobile/www/
      - name: Run same-build 1024-square shared Web performance simulator
        env:
          CHROME_BIN: /usr/bin/google-chrome
          AICO8_CHROME_HEADFUL: "1"
        run: xvfb-run --auto-servernum --server-args="-screen 0 1024x1024x24 -ac +extension GLX +render -noreset" pnpm capture:android-web-simulator -- --product apps/mobile/www --target apps/mobile/target-profile.json --evidence artifacts/test-reports/android-square-api35
      - name: Copy Web host through Capacitor
        run: pnpm --filter @aico8/mobile exec cap sync android
      - name: Create disposable research-only CI signing key
        run: keytool -genkeypair -noprompt -storetype PKCS12 -keystore "$RUNNER_TEMP/aico8-ci.p12" -storepass aico8-ci-only -keypass aico8-ci-only -alias aico8-ci -keyalg RSA -keysize 3072 -validity 2 -dname "CN=Aico 8 CI Research,O=Aico 8,C=XX"
      - name: Clean-build debug APK and signed research APK/AAB
        working-directory: apps/mobile/android
        env:
          AICO8_ANDROID_KEYSTORE: ${{ runner.temp }}/aico8-ci.p12
          AICO8_ANDROID_KEYSTORE_PASSWORD: aico8-ci-only
          AICO8_ANDROID_KEY_ALIAS: aico8-ci
          AICO8_ANDROID_KEY_PASSWORD: aico8-ci-only
        run: ./gradlew clean assembleDebug assembleRelease bundleRelease :app:assembleAndroidTest
      - name: Verify APK and AAB signatures
        run: |
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          jarsigner -verify -verbose -certs apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
      - name: Enable Linux emulator acceleration
        run: |
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
          fi
      - name: Run named 1024-square API 35 emulator acceptance
        run: scripts/run-android-square-emulator.sh apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk apps/mobile/android/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
      - name: Retain square-emulator evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-square-api35-${{ github.sha }}
          path: artifacts/test-reports/android-square-api35
          if-no-files-found: error
